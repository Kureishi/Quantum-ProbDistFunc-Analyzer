# ── Fine-tuning configuration ──────────────────────────────────────────────
# Edit these settings before running scripts/finetune.py

# ── Model ──────────────────────────────────────────────────────────────────
base_model: "unsloth/Qwen2.5-VL-7B-Instruct"   # HuggingFace model ID
# Alternatives (uncomment to use):
# base_model: "unsloth/Qwen2.5-VL-3B-Instruct"
# base_model: "unsloth/Llama-3.2-11B-Vision-Instruct"
# base_model: "unsloth/gemma-3-4b-it"

load_in_4bit: true        # QLoRA (4-bit). Set false for 16-bit LoRA (needs more VRAM)
max_seq_length: 2048

# ── LoRA adapter ───────────────────────────────────────────────────────────
lora:
  r: 16                   # Rank — higher = more capacity, more VRAM (8–64)
  alpha: 32               # Scaling factor (typically 2× rank)
  dropout: 0.05
  target_modules:         # Which attention projections to adapt
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  finetune_vision_layers: true   # Also adapt the vision encoder (important for VLMs)
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

# ── Data ───────────────────────────────────────────────────────────────────
data:
  train_file: "./data/train.jsonl"
  val_file:   "./data/val.jsonl"
  test_file:  "./data/test.jsonl"
  val_split:  0.1          # fraction of data held out for validation
  test_split: 0.1          # fraction of data held out for final evaluation
  image_size: 512          # resize images to this square size before training

# ── Training ───────────────────────────────────────────────────────────────
training:
  output_dir:       "./output/adapter"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size:  2
  gradient_accumulation_steps: 4   # effective batch = 2×4 = 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: false                       # use bf16 if available
  bf16: true
  gradient_checkpointing: "unsloth" # "unsloth" | true | false
  dataloader_num_workers: 0   # KEEP AT 0 ON WINDOWS — see finetune.py header
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"                 # "wandb" | "tensorboard" | "none"
  seed: 42

# ── Export ─────────────────────────────────────────────────────────────────
export:
  merged_dir:  "./output/merged"
  gguf_dir:    "./output/gguf"
  quantisation: "q4_k_m"   # GGUF quant: q4_k_m | q5_k_m | q8_0 | f16
  # q4_k_m  → smallest file, fast, slight quality loss  (~4 GB for 7B)
  # q5_k_m  → good balance                              (~5 GB for 7B)
  # q8_0    → near-lossless, larger file                (~8 GB for 7B)
  # f16     → no quantisation, largest                  (~14 GB for 7B)

# ── LM Studio inference ────────────────────────────────────────────────────
lmstudio:
  base_url:    "http://localhost:1234/v1"
  api_key:     "lm-studio"          # dummy key, ignored by LM Studio
  model:       ""                   # leave blank to auto-detect from /v1/models
  temperature: 0.1                  # low = more deterministic for structured output
  max_tokens:  512
